# Switchboard web front door — dropped into /etc/nginx/conf.d/default.conf of the
# (non-root) nginx-unprivileged image. Serves the built SPA with history-API
# fallback + gzip + security headers, and reverse-proxies the app's HTTP/WS
# surface to the `api` service. TLS is terminated upstream by the company proxy;
# this server speaks plain HTTP on :8080 (ARCHITECTURE §8).

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Don't leak the nginx version.
  server_tokens off;

  # ---- gzip (static text assets) ----
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/manifest+json
    image/svg+xml
    font/woff
    font/woff2;

  # ---- security headers (applied to every response via `always`) ----
  # NB: these are set with add_header only at server scope, and the locations
  # below use `expires` (not add_header) for caching, so nginx's add_header
  # inheritance is preserved and these apply everywhere.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  # SPA talks to its own origin only (REST /api + WS /ws). 'unsafe-inline' for
  # script covers the pre-paint theme bootstrap inline in index.html; tighten to
  # a nonce/hash if that inline script is removed. No external hosts — fonts are
  # bundled (self-hosted @fontsource), so no font/style CDN is allowed.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
  # HSTS is intentionally NOT set here — the upstream TLS terminator owns it
  # (an HSTS header sent over plain HTTP behind the proxy is ignored anyway).

  # ---- container liveness (local, independent of the api) ----
  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # ---- reverse proxy to the api (runtime DNS via Docker's embedded resolver) ----
  # Variable upstream + resolver → nginx re-resolves `api` when it restarts,
  # instead of pinning the first-seen IP for the process lifetime.
  resolver 127.0.0.11 valid=30s ipv6=off;

  location /api/ {
    set $api_upstream api:3000;
    proxy_pass http://$api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_read_timeout 60s;
  }

  # Webhook ingress (/wh/twilio/*, /wh/gmail) — persist-then-process, fast 200.
  location /wh/ {
    set $api_upstream api:3000;
    proxy_pass http://$api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
  }

  # WebSocket hub (/ws) — live inbox/timeline invalidation hints (C7).
  location /ws {
    set $api_upstream api:3000;
    proxy_pass http://$api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
  }

  # App liveness probe passthrough (checks Postgres/Redis/queue/sync-lag, §8).
  location = /healthz {
    set $api_upstream api:3000;
    proxy_pass http://$api_upstream;
    proxy_set_header Host $host;
  }

  # ---- static SPA ----
  # Hashed build assets are immutable → cache hard. Caching uses `expires` (not
  # add_header) to preserve the security-header inheritance above.
  location /assets/ {
    expires 1y;
    access_log off;
    try_files $uri =404;
  }

  # History-API fallback: unknown paths render the SPA shell. index.html itself
  # must not be cached, so new deploys are picked up immediately.
  location / {
    expires -1;
    try_files $uri $uri/ /index.html;
  }
}
