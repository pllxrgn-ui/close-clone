services:
  - type: web
    name: switchboard-api-pllxrgn
    runtime: docker
    region: singapore
    plan: starter
    dockerfilePath: ./apps/api/Dockerfile
    healthCheckPath: /healthz
    autoDeployTrigger: checksPass
    disk:
      name: imports
      mountPath: /var/lib/switchboard
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ROLE
        value: server
      - key: MOCK_MODE
        value: '0'
      - key: MIGRATE_ON_BOOT
        value: '1'
      - key: DATABASE_URL
        fromDatabase:
          name: switchboard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: switchboard-queue
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: LIST_UNSUBSCRIBE_SECRET
        generateValue: true
      - key: IMPORT_STORAGE_DIR
        value: /var/lib/switchboard/imports
      - key: WEB_ORIGIN
        value: https://switchboard-demo-omega.vercel.app
      - key: PUBLIC_WEBHOOK_URL
        value: https://switchboard-api-pllxrgn.onrender.com
      - key: OIDC_ISSUER
        sync: false
      - key: OIDC_CLIENT_ID
        sync: false
      - key: OIDC_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GMAIL_PUSH_AUDIENCE
        value: https://switchboard-api-pllxrgn.onrender.com/wh/gmail
      - key: GMAIL_PUSH_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_API_KEY_SID
        sync: false
      - key: TWILIO_API_KEY_SECRET
        sync: false
      - key: TWILIO_TWIML_APP_SID
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: keyvalue
    name: switchboard-queue
    region: singapore
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: noeviction
    persistenceMode: journal-snapshot

databases:
  - name: switchboard-db
    region: singapore
    plan: basic-256mb
    postgresMajorVersion: '16'
    databaseName: switchboard
    user: switchboard
    ipAllowList: []
    storageAutoscalingEnabled: true
